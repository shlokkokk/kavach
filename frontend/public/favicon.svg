<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="cyber-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00ffb2"/>
      <stop offset="50%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00c853"/>
    </linearGradient>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Outer Hexagonal Frame -->
  <path d="M32 4L56 18V46L32 60L8 46V18L32 4Z" stroke="url(#cyber-grad)" stroke-width="2" stroke-linejoin="round" filter="url(#neon-glow)"/>
  
  <!-- Inner Protection Ring -->
  <path d="M32 12L48 22V42L32 52L16 42V22L32 12Z" fill="url(#cyber-grad)" fill-opacity="0.1" stroke="url(#cyber-grad)" stroke-width="0.5" stroke-dasharray="2 2"/>
  
  <!-- Core Shield Element -->
  <path d="M32 20L42 26V38L32 44L22 38V26L32 20Z" fill="url(#cyber-grad)"/>
  
  <!-- "K" for KAVACH inside the core (stylized) -->
  <path d="M28 26V38M28 32L34 26M28 32L34 38" stroke="#030810" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Digital Pulse Dots -->
  <circle cx="32" cy="4" r="2" fill="#00ffb2" filter="url(#neon-glow)"/>
  <circle cx="56" cy="18" r="1.5" fill="#00ffb2" opacity="0.6"/>
  <circle cx="56" cy="46" r="1.5" fill="#00ffb2" opacity="0.6"/>
  <circle cx="32" cy="60" r="2" fill="#00ffb2" filter="url(#neon-glow)"/>
  <circle cx="8" cy="46" r="1.5" fill="#00ffb2" opacity="0.6"/>
  <circle cx="8" cy="18" r="1.5" fill="#00ffb2" opacity="0.6"/>
</svg>